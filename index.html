<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VitalEdge Lab — Comunicación visual para healthcare</title>
  <meta name="description" content="Agencia de comunicación visual y diseño estratégico especializada en healthcare: clínicas, pharma y startups de salud. Convertimos lo complejo en claro.">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Fonts: Fraunces (display) · Hanken Grotesk (body) · Jost (utility) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Hanken+Grotesk:wght@400;500&family=Jost:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>

  <!-- ===================== NAVBAR ===================== -->
  <header class="site-header" data-nav>
    <!-- Phase 1: logo · anchor links · "Solicita una propuesta" CTA -->
  </header>

  <main id="main">

    <!-- ===================== HERO ===================== -->
    <section id="hero" class="hero section" aria-labelledby="hero-title">
      <!-- Phase 1: eyebrow · H1 thesis · subtitle · dual CTA · circle texture -->
    </section>

    <!-- ===================== INTRO / QUIÉNES SOMOS ===================== -->
    <section id="intro" class="intro section" aria-labelledby="intro-title">
      <!-- Phase 2: editorial intro + 5-point differentiator grid -->
    </section>

    <!-- ===================== SERVICIOS ===================== -->
    <section id="servicios" class="servicios section" aria-labelledby="servicios-title">
      <!-- Phase 3: opening H2 + 4 service blocks A–D (zig-zag, lens images) -->
    </section>

    <!-- ===================== PROYECTOS ===================== -->
    <section id="proyectos" class="proyectos section" aria-labelledby="proyectos-title">
      <!-- Phase 4: 6 project placeholders inside lens/capsule frames -->
    </section>

    <!-- ===================== METODOLOGÍA ===================== -->
    <section id="metodologia" class="metodologia section" aria-labelledby="metodologia-title">
      <!-- Phase 4: 6-phase numbered timeline 01–06 with drawn connector -->
    </section>

    <!-- ===================== CONTACTO ===================== -->
    <section id="contacto" class="contacto section" aria-labelledby="contacto-title">
      <!-- Phase 5: H2 + Netlify form + direct contact details -->
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer" aria-labelledby="footer-title">
    <!-- Phase 5: logo · tagline · mini-nav · socials · locations · legal -->
  </footer>

  <!-- Scripts (libraries + behaviour added in Phase 7) -->
  <script src="js/main.js" defer></script>
  <script src="js/animations.js" defer></script>
</body>
</html>
